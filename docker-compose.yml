version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dojocontrol_postgres
    environment:
      POSTGRES_USER: dojocontrol
      POSTGRES_PASSWORD: dojocontrol_secure_pwd_2026
      POSTGRES_DB: dojocontrol_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dojocontrol"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dojocontrol_network

  # Redis Cache (optional, for sessions/caching)
  redis:
    image: redis:7-alpine
    container_name: dojocontrol_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dojocontrol_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dojocontrol_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://dojocontrol:dojocontrol_secure_pwd_2026@postgres:5432/dojocontrol_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_change_in_production
      JWT_EXPIRE: 24h
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    networks:
      - dojocontrol_network
    command: npm run dev

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: dojocontrol_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - dojocontrol_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  dojocontrol_network:
    driver: bridge