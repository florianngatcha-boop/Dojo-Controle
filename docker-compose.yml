version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dojocontrol_postgres
    environment:
      POSTGRES_USER: dojocontrol
      POSTGRES_PASSWORD: dojocontrol_secure_pwd_2026
      POSTGRES_DB: dojocontrol_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dojocontrol"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dojocontrol_backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: dojocontrol
      DB_PASSWORD: dojocontrol_secure_pwd_2026
      DB_NAME: dojocontrol_db
      JWT_SECRET: your_super_secret_jwt_key_2026
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  frontend:
    image: node:18-alpine
    container_name: dojocontrol_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
