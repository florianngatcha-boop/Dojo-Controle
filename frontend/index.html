<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DojoControl - Inscription des Clubs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --color-primary: #1E3A8A; --color-accent: #378ADD; --color-success: #1D9E75; 
      --color-danger: #E24B4A; --color-warning: #F59E0B;
      --color-bg: #F4F7FA; --color-card: #FFFFFF; --color-text: #2C3E50;
      --color-text-light: #7F8C8D; --color-border: #E2E8F0; 
      --border-radius-lg: 12px; --border-radius-md: 8px;
    }
    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background-color: var(--color-bg); color: var(--color-text); margin: 0; padding: 0; }
    
    .navbar { background: var(--color-primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .navbar h1 { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 10px; }
    .nav-links { display: flex; gap: 20px; }
    .nav-link { color: #94A3B8; text-decoration: none; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: white; }
    
    .wrap { max-width: 950px; margin: 2rem auto; padding: 0 1rem; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { margin: 0; color: var(--color-primary); font-size: 28px; }
    header p { margin: 5px 0 0; color: var(--color-text-light); }
    
    .step-bar { display: flex; gap: 8px; margin-bottom: 2rem; }
    .step { flex: 1; height: 6px; border-radius: 3px; background: var(--color-border); transition: all 0.3s; }
    .step.done { background: var(--color-success); }
    .step.active { background: var(--color-accent); }
    #step-label { font-size: 14px; font-weight: 600; color: var(--color-primary); margin-bottom: 1rem; text-transform: uppercase; }
    
    .screen { display: none; } 
    .screen.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .section-card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .section-title { font-size: 16px; font-weight: 600; margin: 0 0 1.25rem 0; display: flex; align-items: center; gap: 8px; color: var(--color-primary); }
    .field-row { display: grid; gap: 15px; margin-bottom: 15px; }
    .field-row.two { grid-template-columns: 1fr 1fr; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--color-text-light); margin-bottom: 5px; text-transform: uppercase; }
    .req { color: var(--color-danger); margin-left: 2px; }
    
    input[type="text"], input[type="email"], input[type="tel"], input[type="date"], input[type="number"], select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--color-border); border-radius: var(--border-radius-md); font-size: 14px; color: var(--color-text);
    }
    
    .btn-primary, .btn-submit, .btn-prev { padding: 10px 20px; border-radius: var(--border-radius-md); border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: var(--color-accent); color: white; }
    .btn-primary:hover { background: #2563EB; }
    .btn-prev { background: #E2E8F0; color: var(--color-text); }
    .btn-submit { background: var(--color-success); color: white; width: 100%; justify-content: center; font-size: 16px; }
    
    .nav-row { display: flex; justify-content: space-between; margin-top: 2rem; }
    .nav-row.right { justify-content: flex-end; }
  </style>
</head>
<body>

<nav class="navbar">
  <h1><i class="ti ti-form"></i> DojoControl — Portail Inscriptions</h1>
</nav>

<div class="wrap">
  <header>
    <h1>DojoControl</h1>
    <p>Portail d'inscription officiel du Festival de Judo de Maroua (Édition 2026)</p>
  </header>

  <div id="step-label">Étape 1 sur 4 — Informations club</div>
  <div class="step-bar">
    <div class="step active" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
    <div class="step" id="s4"></div>
  </div>

  <div class="screen active" id="screen-1">
    <div class="section-card">
      <p class="section-title"><i class="ti ti-building-castle"></i> Identité du Club</p>
      <div class="field-row two">
        <div>
          <div class="field-label">Nom officiel du Club <span class="req">*</span></div>
          <input type="text" id="club-name" placeholder="ex: Judo Club de Maroua" required>
        </div>
        <div>
          <div class="field-label">Abréviation (TV/Table de marque) <span class="req">*</span></div>
          <input type="text" id="club-abbr" placeholder="ex: JCM" maxlength="5" style="text-transform: uppercase;" required>
        </div>
      </div>
    </div>
    <div class="nav-row right">
      <button class="btn-primary" onclick="goTo(2)">Suivant <i class="ti ti-arrow-right"></i></button>
    </div>
  </div>

  <div class="screen" id="screen-2">
    <div class="section-card">
      <p class="section-title"><i class="ti ti-users"></i> Athlètes</p>
      <button class="btn-primary" onclick="ajouterAthlete()"><i class="ti ti-plus"></i> Ajouter athlète</button>
    </div>
    <div class="nav-row">
      <button class="btn-prev" onclick="goTo(1)"><i class="ti ti-arrow-left"></i> Précédent</button>
      <button class="btn-primary" onclick="goTo(3)">Suivant <i class="ti ti-arrow-right"></i></button>
    </div>
  </div>

  <div class="screen" id="screen-3">
    <div class="section-card">
      <p class="section-title"><i class="ti ti-check"></i> Vérification</p>
      <button class="btn-submit" onclick="sauvegarderClub()">Soumettre</button>
    </div>
    <div class="nav-row">
      <button class="btn-prev" onclick="goTo(2)"><i class="ti ti-arrow-left"></i> Précédent</button>
    </div>
  </div>
</div>

<script type="module">
  import axios from 'https://cdn.jsdelivr.net/npm/axios@1.6.0/+esm';

  const API_URL = 'http://localhost:5000/api/v1';
  let token = localStorage.getItem('jwt_token');

  window.goTo = function(step) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.step').forEach(st => st.className = 'step');
    document.getElementById('screen-' + step).classList.add('active');
    
    const labels = ["Informations club", "Liste des compétiteurs", "Vérification & Validation"];
    document.getElementById('step-label').textContent = `Étape ${step} sur 3 — ${labels[step-1]}`;

    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById('s' + i);
      if (i < step) el.classList.add('done');
      if (i === step) el.classList.add('active');
    }
    window.scrollTo(0, 0);
  };

  window.ajouterAthlete = function() {
    const container = document.getElementById('athletes-list') || document.createElement('div');
    container.id = 'athletes-list';
    const row = document.createElement('div');
    row.style.marginBottom = '10px';
    row.innerHTML = `
      <input type="text" placeholder="Nom" class="ath-nom" style="width: 100%; padding: 8px; margin-bottom: 5px;">
      <input type="text" placeholder="Prénom" class="ath-prenom" style="width: 100%; padding: 8px;">
    `;
    container.appendChild(row);
    document.getElementById('screen-2').querySelector('.section-card').appendChild(container);
  };

  window.sauvegarderClub = async function() {
    const clubName = document.getElementById('club-name').value;
    const clubAbbr = document.getElementById('club-abbr').value;

    if (!clubName || !clubAbbr) {
      alert('Veuillez remplir tous les champs');
      return;
    }

    try {
      if (!token) {
        const loginRes = await axios.post(`${API_URL}/auth/login`, {
          email: 'admin@dojocontrol.local',
          password: 'admin123'
        });
        token = loginRes.data.token;
        localStorage.setItem('jwt_token', token);
      }

      const response = await axios.post(`${API_URL}/clubs`, {
        name: clubName,
        abbreviation: clubAbbr,
        manager: 'Manager',
        city: 'Maroua',
        email: 'club@example.com',
        phone: '+237'
      }, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      alert('Club créé avec succès!');
      window.location.reload();
    } catch (err) {
      console.error(err);
      alert('Erreur lors de la sauvegarde');
    }
  };

  // Auto login pour démo
  window.onload = async () => {
    if (!token) {
      try {
        const res = await axios.post(`${API_URL}/auth/login`, {
          email: 'admin@dojocontrol.local',
          password: 'admin123'
        }).catch(() => 
          axios.post(`${API_URL}/auth/register`, {
            email: 'admin@dojocontrol.local',
            password: 'admin123',
            role: 'organizer'
          })
        );
        token = res.data.token;
        localStorage.setItem('jwt_token', token);
      } catch (err) {
        console.log('Auth setup needed');
      }
    }
  };
</script>
</body>
</html>
